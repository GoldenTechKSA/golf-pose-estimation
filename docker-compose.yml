name: swinglens

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: swinglens
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swinglens}
      POSTGRES_DB: swinglens
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swinglens"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment: &backend-env
      DATABASE_URL: postgresql+psycopg2://swinglens:${POSTGRES_PASSWORD:-swinglens}@postgres:5432/swinglens
      REDIS_URL: redis://redis:6379/0
      STORAGE_DIR: /data/storage
      PROCESSING_MODE: celery
      # CPU-only by default (see .env.example) — nano keeps analysis interactive.
      POSE_MODEL: ${POSE_MODEL:-yolo11n-pose.pt}
      POSE_IMGSZ: ${POSE_IMGSZ:-640}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      COACHING_MODEL: ${COACHING_MODEL:-claude-sonnet-5}
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:3001"]'
    volumes:
      - storage:/data/storage
      - models:/data/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=1
    environment: *backend-env
    volumes:
      - storage:/data/storage
      - models:/data/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      args:
        # URL the *browser* uses to reach the API.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  storage:
  models:
